<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<title>Claude Counter</title>
<style>
  :root {
    --bg: rgba(24, 23, 21, 0.78);
    --border: rgba(255, 255, 255, 0.10);
    --text: #ECEAE4;
    --muted: #a7a49d;
    --hint: #8a8884;
    --subtle: #6f6c66;
    --label: #d9d6cf;
    --btn: #86837c;
    --btn-hover-fg: #ffffff;
    --btn-hover-bg: rgba(255, 255, 255, 0.10);
    --bar-bg: rgba(255, 255, 255, 0.10);
    --primary: #5aa6ff;
    --primary-soft: #74b4ff;
    --good: #4ade80;
    --good-text: #5fcf87;
    --warn: #fbbf24;
    --bad: #ef6f6e;
    --bad-fill: #e2504f;
    --mark: #ffffff;
    --idle: #fbbf24;
    --divider: rgba(255, 255, 255, 0.10);
  }
  body.light {
    --bg: rgba(250, 248, 243, 0.82);
    --border: rgba(0, 0, 0, 0.12);
    --text: #1f1e1c;
    --muted: #5a5750;
    --hint: #6a6760;
    --subtle: #8a877f;
    --label: #2b2a26;
    --btn: #6a6760;
    --btn-hover-fg: #000000;
    --btn-hover-bg: rgba(0, 0, 0, 0.08);
    --bar-bg: rgba(0, 0, 0, 0.10);
    --primary: #2563eb;
    --primary-soft: #1d4ed8;
    --good: #16a34a;
    --good-text: #15803d;
    --warn: #c2410c;
    --bad: #dc2626;
    --bad-fill: #b91c1c;
    --mark: #1f1e1c;
    --idle: #c2410c;
    --divider: rgba(0, 0, 0, 0.12);
  }
  html, body {
    margin: 0; padding: 0; height: 100%;
    background: transparent; overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    -webkit-user-select: none; user-select: none; cursor: default;
  }
  #bar {
    position: fixed; inset: 0; box-sizing: border-box;
    display: flex; align-items: center; gap: 12px;
    padding: 0 12px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-size: 12px;
    -webkit-backdrop-filter: blur(14px) saturate(140%);
    backdrop-filter: blur(14px) saturate(140%);
    -webkit-app-region: drag;
    transition: background 0.18s ease, color 0.18s ease, border-color 0.18s ease;
  }
  #dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--idle); flex: none;
  }
  #brand { font-size: 11px; font-weight: 600; color: var(--muted); letter-spacing: .02em; flex: none; }
  #metrics {
    display: flex; align-items: center; gap: 12px;
    flex: 1 1 auto; min-width: 0;
  }
  .div {
    width: 1px; height: 16px; background: var(--divider); flex: none;
  }
  .cell {
    display: flex; align-items: center; gap: 8px;
    flex: 1 1 0; min-width: 0;
  }
  .cell.ctx { flex: 1.4 1 0; }
  .cell .lab { color: var(--label); font-weight: 600; flex: none; }
  .cell .val { color: var(--text); font-variant-numeric: tabular-nums; flex: none; }
  .cell .track {
    position: relative; height: 7px; flex: 1 1 auto; min-width: 50px;
    border-radius: 3px; background: var(--bar-bg);
  }
  .cell .fill {
    position: absolute; left: 0; top: 0; bottom: 0; width: 0%;
    border-radius: 3px; background: var(--primary);
    transition: width 0.3s ease, background-color 0.2s ease;
  }
  .cell .mark {
    position: absolute; top: -2px; bottom: -2px; width: 2px;
    background: var(--mark); left: 0%;
  }
  .cell .aux {
    font-size: 11px; color: var(--btn); white-space: nowrap; flex: none;
    overflow: hidden; text-overflow: ellipsis; max-width: 28ch;
    font-variant-numeric: tabular-nums;
  }
  #ctxName { cursor: pointer; -webkit-app-region: no-drag; }
  #ctxName:hover { text-decoration: underline; }
  .btn {
    -webkit-app-region: no-drag; background: none; border: none; color: var(--btn);
    font-size: 13px; line-height: 1; cursor: pointer; padding: 5px 7px; border-radius: 5px;
    flex: none; transition: color 0.15s, background 0.15s;
  }
  .btn:hover { color: var(--btn-hover-fg); background: var(--btn-hover-bg); }
  #buttons { display: flex; align-items: center; gap: 1px; flex: none; }
  #umsg {
    flex: 1 1 auto; text-align: center; color: var(--muted); font-size: 12px;
    -webkit-app-region: no-drag; cursor: pointer;
  }
  .hidden { display: none !important; }
</style>
</head>
<body>
<div id="bar">
  <span id="dot"></span>
  <span id="brand">Claude Counter</span>

  <div id="metrics">
    <div class="div"></div>
    <div class="cell" id="wk">
      <span class="lab">Weekly</span>
      <span class="val" id="wkPct">–</span>
      <div class="track"><div class="fill" id="wkFill"></div><div class="mark" id="wkMark"></div></div>
      <span class="aux" id="wkAux"></span>
    </div>
    <div class="div"></div>
    <div class="cell" id="se">
      <span class="lab">Session</span>
      <span class="val" id="sePct">–</span>
      <div class="track"><div class="fill" id="seFill"></div><div class="mark" id="seMark"></div></div>
      <span class="aux" id="seAux"></span>
    </div>
    <div class="div"></div>
    <div class="cell ctx" id="ct">
      <span class="lab">Context</span>
      <span class="val" id="ctxVal">–</span>
      <div class="track"><div class="fill" id="ctxFill"></div></div>
      <span class="aux" id="ctxName" title="Click to pick a session"></span>
    </div>
  </div>

  <div id="umsg" class="hidden"></div>

  <div id="buttons">
    <button class="btn" id="theme" title="Switch theme">&#9728;</button>
    <button class="btn" id="pick" title="Pick which session to track">&#9678;</button>
    <button class="btn" id="refresh" title="Refresh now">&#8635;</button>
    <button class="btn" id="close" title="Quit">&#10005;</button>
  </div>
</div>

<script>
'use strict';
const { ipcRenderer } = require('electron');
const WK = 7 * 24 * 60 * 60 * 1000;
const SE = 5 * 60 * 60 * 1000;
const THEME_KEY = 'cc-theme';
const SUN = '☀';
const MOON = '☾';

let ctx = null;
let usage = null;
const $ = (s) => document.querySelector(s);

function cssVar(name) {
  return getComputedStyle(document.documentElement).getPropertyValue(name).trim();
}

function fmtTokens(n) {
  if (!n || n < 0) return '0';
  if (n >= 1000) return Math.round(n / 1000) + 'k';
  return String(n);
}

function fmtReset(ms) {
  if (ms <= 0) return 'now';
  const s = Math.floor(ms / 1000);
  if (s < 60) return s + 's';
  const m = Math.round(s / 60);
  if (m < 60) return m + 'm';
  const h = Math.floor(m / 60), rm = m % 60;
  if (h < 24) return h + 'h ' + rm + 'm';
  const d = Math.floor(h / 24), rh = h % 24;
  return d + 'd ' + rh + 'h';
}

function fmtHours(h) {
  if (h >= 10) return Math.round(h) + 'h';
  return (Math.round(h * 10) / 10) + 'h';
}

function dotColor() {
  if (usage && usage.state === 'error') return cssVar('--bad');
  if (usage && usage.state === 'ok') return cssVar('--good');
  return cssVar('--idle');
}

function renderWeekly(w) {
  const fill = $('#wkFill'), mark = $('#wkMark'), aux = $('#wkAux');
  if (!w) {
    $('#wkPct').textContent = '–';
    fill.style.width = '0%'; mark.style.display = 'none'; aux.textContent = '';
    return;
  }
  const u = Math.max(0, Math.min(100, w.utilization));
  $('#wkPct').textContent = (Math.round(u * 10) / 10) + '%';
  fill.style.width = u + '%';
  if (w.resets_at) {
    const reset = Date.parse(w.resets_at);
    const elapsed = Math.max(0, Math.min(1, (Date.now() - (reset - WK)) / WK));
    const expected = elapsed * 100;
    const delta = u - expected;
    mark.style.display = '';
    mark.style.left = Math.max(0, Math.min(100, expected)) + '%';
    if (delta > 1) {
      const hrs = delta * (WK / 3600000) / 100;
      aux.textContent = '↑ ' + Math.round(delta) + '% over · ~' + fmtHours(hrs) + ' to normal';
      aux.style.color = cssVar('--bad');
      fill.style.background = cssVar('--bad-fill');
    } else if (delta < -1) {
      aux.textContent = '↓ ' + Math.round(-delta) + '% under pace';
      aux.style.color = cssVar('--good-text');
      fill.style.background = cssVar('--good');
    } else {
      aux.textContent = 'on pace';
      aux.style.color = cssVar('--btn');
      fill.style.background = cssVar('--primary');
    }
  } else {
    mark.style.display = 'none';
    aux.textContent = '';
    fill.style.background = cssVar('--primary');
  }
}

function renderSession(w) {
  const fill = $('#seFill'), mark = $('#seMark'), aux = $('#seAux');
  if (!w) {
    $('#sePct').textContent = '–';
    fill.style.width = '0%'; mark.style.display = 'none'; aux.textContent = '';
    return;
  }
  const u = Math.max(0, Math.min(100, w.utilization));
  $('#sePct').textContent = (Math.round(u * 10) / 10) + '%';
  fill.style.width = u + '%';
  fill.style.background = cssVar('--primary');
  if (w.resets_at) {
    const reset = Date.parse(w.resets_at);
    aux.textContent = 'resets in ' + fmtReset(reset - Date.now());
    aux.style.color = cssVar('--btn');
    const el = Math.max(0, Math.min(1, (Date.now() - (reset - SE)) / SE));
    mark.style.display = '';
    mark.style.left = (el * 100) + '%';
  } else {
    aux.textContent = '';
    mark.style.display = 'none';
  }
}

function renderUsage() {
  const ok = !!(usage && usage.state === 'ok' && usage.usage);
  $('#metrics').classList.toggle('hidden', !ok);
  $('#umsg').classList.toggle('hidden', ok);
  if (ok) {
    renderWeekly(usage.usage.seven_day);
    renderSession(usage.usage.five_hour);
    return;
  }
  const m = $('#umsg');
  if (usage && usage.state === 'login') {
    m.textContent = 'Sign in to claude.ai for the usage bars  (click)';
    m.style.color = cssVar('--muted');
    m.onclick = () => ipcRenderer.send('cc-login');
  } else if (usage && usage.state === 'error') {
    m.textContent = '⚠ ' + (usage.message || 'Connection error') + '  (click to retry)';
    m.style.color = cssVar('--bad');
    m.onclick = () => ipcRenderer.send('cc-refresh');
  } else {
    m.textContent = 'Checking usage…';
    m.style.color = cssVar('--muted');
    m.onclick = null;
  }
}

function renderContext() {
  const val = $('#ctxVal'), name = $('#ctxName'), fill = $('#ctxFill');
  if (!ctx) {
    val.textContent = '–'; val.style.color = cssVar('--btn');
    name.textContent = 'no session found'; name.style.color = cssVar('--subtle');
    fill.style.width = '0%';
    return;
  }
  if (ctx.unavailable) {
    val.textContent = '–'; val.style.color = cssVar('--btn');
    name.textContent = 'claude · ' + (ctx.title || 'chat') + ' — sign in';
    name.style.color = cssVar('--subtle');
    fill.style.width = '0%';
    return;
  }
  const kindLabel = ctx.kind === 'web' ? 'claude · ' : 'cowork · ';
  val.textContent = '~' + fmtTokens(ctx.tokens);
  const pct = Math.max(0, Math.min(100, (ctx.tokens / (ctx.limit || 1000000)) * 100));
  fill.style.width = pct + '%';
  name.textContent = kindLabel + (ctx.title || 'session');
  if (ctx.tier === 'huge') {
    val.style.color = cssVar('--bad');
    fill.style.background = cssVar('--bad-fill');
    name.style.color = cssVar('--bad');
  } else if (ctx.tier === 'large') {
    val.style.color = cssVar('--warn');
    fill.style.background = cssVar('--warn');
    name.style.color = cssVar('--hint');
  } else {
    val.style.color = cssVar('--text');
    fill.style.background = cssVar('--primary');
    name.style.color = cssVar('--subtle');
  }
}

function applyTheme(t) {
  document.body.classList.toggle('light', t === 'light');
  const btn = $('#theme');
  btn.innerHTML = t === 'light' ? MOON : SUN;
  btn.title = 'Switch to ' + (t === 'light' ? 'dark' : 'light') + ' theme';
}

function loadTheme() {
  let t = null;
  try { t = localStorage.getItem(THEME_KEY); } catch (e) { /* ignore */ }
  return (t === 'light' || t === 'dark') ? t : 'dark';
}

function saveTheme(t) {
  try { localStorage.setItem(THEME_KEY, t); } catch (e) { /* ignore */ }
}

function render() {
  $('#dot').style.background = dotColor();
  renderUsage();
  renderContext();
}

ipcRenderer.on('usage', (_e, d) => { usage = d; render(); });
ipcRenderer.on('context', (_e, d) => { ctx = d; render(); });

$('#pick').onclick = () => ipcRenderer.send('cc-open-picker');
$('#refresh').onclick = () => ipcRenderer.send('cc-refresh');
$('#close').onclick = () => ipcRenderer.send('cc-quit');
$('#ctxName').onclick = () => ipcRenderer.send('cc-open-picker');
$('#theme').onclick = () => {
  const next = document.body.classList.contains('light') ? 'dark' : 'light';
  applyTheme(next);
  saveTheme(next);
  render();
};

applyTheme(loadTheme());
setInterval(() => { if (usage && usage.state === 'ok') render(); }, 1000);
render();
</script>
</body>
</html>
