<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<title>Claude Counter</title>
<style>
  :root {
    --bg: #1e1d1b;
    --border: rgba(255, 255, 255, 0.09);
    --text: #ECEAE4;
    --muted: #a7a49d;
    --hint: #8a8884;
    --subtle: #6f6c66;
    --label: #d9d6cf;
    --btn: #86837c;
    --btn-hover-fg: #ffffff;
    --btn-hover-bg: rgba(255, 255, 255, 0.09);
    --bar-bg: rgba(255, 255, 255, 0.08);
    --primary: #5aa6ff;
    --primary-soft: #74b4ff;
    --good: #4ade80;
    --good-text: #5fcf87;
    --warn: #fbbf24;
    --bad: #ef6f6e;
    --bad-fill: #e2504f;
    --mark: #ffffff;
    --idle: #fbbf24;
  }
  body.light {
    --bg: #faf8f3;
    --border: rgba(0, 0, 0, 0.12);
    --text: #1f1e1c;
    --muted: #5a5750;
    --hint: #6a6760;
    --subtle: #8a877f;
    --label: #2b2a26;
    --btn: #6a6760;
    --btn-hover-fg: #000000;
    --btn-hover-bg: rgba(0, 0, 0, 0.06);
    --bar-bg: rgba(0, 0, 0, 0.08);
    --primary: #2563eb;
    --primary-soft: #1d4ed8;
    --good: #16a34a;
    --good-text: #15803d;
    --warn: #c2410c;
    --bad: #dc2626;
    --bad-fill: #b91c1c;
    --mark: #1f1e1c;
    --idle: #c2410c;
  }
  html, body {
    margin: 0; padding: 0; height: 100%;
    background: transparent; overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    -webkit-user-select: none; user-select: none; cursor: default;
  }
  #card {
    position: fixed; inset: 0; box-sizing: border-box;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 12px; padding: 8px 12px 9px;
    color: var(--text);
    transition: background 0.18s ease, color 0.18s ease, border-color 0.18s ease;
  }
  #title {
    display: flex; align-items: center; gap: 7px; height: 18px;
    -webkit-app-region: drag;
    font-size: 11px; font-weight: 600; letter-spacing: .02em; color: var(--muted);
  }
  #dot { width: 7px; height: 7px; border-radius: 50%; background: var(--idle); flex: none; }
  #title .sp { flex: 1; }
  .btn {
    -webkit-app-region: no-drag; background: none; border: none; color: var(--btn);
    font-size: 13px; line-height: 1; cursor: pointer; padding: 2px 4px; border-radius: 4px;
    transition: color 0.15s, background 0.15s;
  }
  .btn:hover { color: var(--btn-hover-fg); background: var(--btn-hover-bg); }
  #theme { font-size: 12px; }

  .metric { margin-top: 7px; }
  .metric:first-child { margin-top: 8px; }
  .mrow { display: flex; align-items: baseline; font-size: 12px; }
  .mrow .lab { color: var(--label); font-weight: 600; }
  .mrow .val { color: var(--text); margin-left: 7px; }
  .mrow .sp { flex: 1; }
  .mrow .rt { font-size: 11px; white-space: nowrap; color: var(--btn); }
  .mrow .tonorm { font-size: 11px; white-space: nowrap; color: var(--hint); margin-left: 8px; }
  .bar {
    position: relative; height: 8px; margin-top: 4px;
    border-radius: 3px; background: var(--bar-bg);
  }
  .fill {
    height: 100%; width: 0%; border-radius: 3px 0 0 3px; background: var(--primary);
    transition: width .35s ease, background-color .3s ease;
  }
  .fill.full { border-radius: 3px; }
  .mark { position: absolute; top: -2px; bottom: -2px; width: 2px; background: var(--mark); left: 0%; }

  #ctx { margin-top: 9px; }
  .crow { display: flex; align-items: center; font-size: 12px; }
  .crow .lab { color: var(--label); font-weight: 600; }
  #ctxBar {
    position: relative; width: 40px; height: 7px; flex: none; margin: 0 8px;
    border-radius: 3px; background: var(--bar-bg);
  }
  #ctxFill { position: absolute; left: 0; top: 0; bottom: 0; width: 0%; border-radius: 3px; background: var(--primary); }
  .crow .val { color: var(--text); }
  .crow .sp { flex: 1; }
  .crow .rt { font-size: 11px; white-space: nowrap; font-weight: 500; }
  #ctxName {
    margin-top: 2px; font-size: 10px; color: var(--subtle); cursor: pointer;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  #ctxName:hover { text-decoration: underline; }

  #umsg { font-size: 12px; color: var(--muted); text-align: center; padding: 12px 4px; }
  #umsg .act {
    -webkit-app-region: no-drag; margin-top: 7px; padding: 4px 13px;
    background: var(--primary); color: #fff; border: none; border-radius: 6px;
    font-size: 12px; cursor: pointer;
  }
  #umsg .act:hover { background: var(--primary-soft); }
  .hidden { display: none !important; }
</style>
</head>
<body>
  <div id="card">
    <div id="title">
      <span id="dot"></span>
      <span>Claude Counter</span>
      <span class="sp"></span>
      <button class="btn" id="theme" title="Switch to light theme">&#9728;</button>
      <button class="btn" id="pick" title="Pick which session to track">&#9678;</button>
      <button class="btn" id="refresh" title="Refresh now">&#8635;</button>
      <button class="btn" id="close" title="Quit">&#10005;</button>
    </div>

    <div id="bars">
      <div class="metric">
        <div class="mrow">
          <span class="lab">Weekly</span><span class="val" id="wkPct">&ndash;</span>
          <span class="tonorm" id="wkToNormal"></span>
          <span class="sp"></span><span class="rt" id="wkPace"></span>
        </div>
        <div class="bar"><div class="fill" id="wkFill"></div><div class="mark" id="wkMark"></div></div>
      </div>
      <div class="metric">
        <div class="mrow">
          <span class="lab">Session</span><span class="val" id="sePct">&ndash;</span>
          <span class="sp"></span><span class="rt" id="seReset"></span>
        </div>
        <div class="bar"><div class="fill" id="seFill"></div><div class="mark" id="seMark"></div></div>
      </div>
    </div>
    <div id="umsg" class="hidden"></div>

    <div id="ctx">
      <div class="crow">
        <span class="lab">Context</span>
        <span id="ctxBar"><span id="ctxFill"></span></span>
        <span class="val" id="ctxVal">&ndash;</span>
        <span class="sp"></span>
        <span class="rt" id="ctxWarn"></span>
      </div>
      <div id="ctxName" title="Click to pick a session">&nbsp;</div>
    </div>
  </div>

<script>
'use strict';
const { ipcRenderer } = require('electron');
const WK = 7 * 24 * 60 * 60 * 1000;
const SE = 5 * 60 * 60 * 1000;
const THEME_KEY = 'cc-theme';
const SUN = '☀';
const MOON = '☾';

let ctx = null;
let usage = null;
const $ = (s) => document.querySelector(s);

function cssVar(name) {
  return getComputedStyle(document.documentElement).getPropertyValue(name).trim();
}

function fmtTokens(n) {
  if (!n || n < 0) return '0';
  if (n >= 1000) return Math.round(n / 1000) + 'k';
  return String(n);
}

function fmtReset(ms) {
  if (ms <= 0) return 'now';
  const s = Math.floor(ms / 1000);
  if (s < 60) return 'in ' + s + 's';
  const m = Math.round(s / 60);
  if (m < 60) return 'in ' + m + 'm';
  const h = Math.floor(m / 60), rm = m % 60;
  if (h < 24) return 'in ' + h + 'h ' + rm + 'm';
  const d = Math.floor(h / 24), rh = h % 24;
  return 'in ' + d + 'd ' + rh + 'h';
}

function fmtHours(h) {
  if (h >= 10) return Math.round(h) + 'h';
  return (Math.round(h * 10) / 10) + 'h';
}

function dotColor() {
  if (usage && usage.state === 'error') return cssVar('--bad');
  if (usage && usage.state === 'ok') return cssVar('--good');
  return cssVar('--idle');
}

function renderWeekly(w) {
  const fill = $('#wkFill'), mark = $('#wkMark'), pace = $('#wkPace');
  const toNorm = $('#wkToNormal');
  if (!w) {
    $('#wkPct').textContent = '–';
    fill.style.width = '0%'; mark.style.display = 'none'; pace.textContent = '';
    toNorm.textContent = '';
    return;
  }
  const u = Math.max(0, Math.min(100, w.utilization));
  $('#wkPct').textContent = (Math.round(u * 10) / 10) + '%';
  fill.style.width = u + '%';
  fill.classList.toggle('full', u >= 99.5);
  if (w.resets_at) {
    const reset = Date.parse(w.resets_at);
    const elapsed = Math.max(0, Math.min(1, (Date.now() - (reset - WK)) / WK));
    const expected = elapsed * 100;
    const delta = u - expected;
    mark.style.display = '';
    mark.style.left = Math.max(0, Math.min(100, expected)) + '%';
    if (delta > 1) {
      pace.textContent = '↑ ' + Math.round(delta) + '% over pace';
      pace.style.color = cssVar('--bad');
      fill.style.background = cssVar('--bad-fill');
      // Hours of zero token use for the pace marker to catch up to current
      // usage. The marker advances 100% per weekly window, so closing a
      // delta-point gap takes delta / (100 / WK_hours) hours.
      const hrs = delta * (WK / 3600000) / 100;
      toNorm.textContent = '~' + fmtHours(hrs) + ' to normal';
    } else if (delta < -1) {
      pace.textContent = '↓ ' + Math.round(-delta) + '% under pace';
      pace.style.color = cssVar('--good-text');
      fill.style.background = cssVar('--good');
      toNorm.textContent = '';
    } else {
      pace.textContent = 'on pace';
      pace.style.color = cssVar('--btn');
      fill.style.background = cssVar('--primary');
      toNorm.textContent = '';
    }
  } else {
    mark.style.display = 'none';
    pace.textContent = '';
    fill.style.background = cssVar('--primary');
    toNorm.textContent = '';
  }
}

function renderSession(w) {
  const fill = $('#seFill'), mark = $('#seMark');
  if (!w) {
    $('#sePct').textContent = '–';
    fill.style.width = '0%'; mark.style.display = 'none'; $('#seReset').textContent = '';
    return;
  }
  const u = Math.max(0, Math.min(100, w.utilization));
  $('#sePct').textContent = (Math.round(u * 10) / 10) + '%';
  fill.style.width = u + '%';
  fill.style.background = cssVar('--primary');
  fill.classList.toggle('full', u >= 99.5);
  if (w.resets_at) {
    const reset = Date.parse(w.resets_at);
    $('#seReset').textContent = 'resets ' + fmtReset(reset - Date.now());
    const el = Math.max(0, Math.min(1, (Date.now() - (reset - SE)) / SE));
    mark.style.display = '';
    mark.style.left = (el * 100) + '%';
  } else {
    $('#seReset').textContent = '';
    mark.style.display = 'none';
  }
}

function renderUsage() {
  const ok = !!(usage && usage.state === 'ok' && usage.usage);
  $('#bars').classList.toggle('hidden', !ok);
  $('#umsg').classList.toggle('hidden', ok);
  if (ok) {
    renderWeekly(usage.usage.seven_day);
    renderSession(usage.usage.five_hour);
    return;
  }
  const m = $('#umsg');
  if (usage && usage.state === 'login') {
    m.innerHTML = 'Sign in to claude.ai for the usage bars.' +
      '<br><button class="act" id="si">Sign in</button>';
    $('#si').onclick = () => ipcRenderer.send('cc-login');
  } else if (usage && usage.state === 'error') {
    m.innerHTML = '⚠ ' + (usage.message || 'Connection error') +
      '<br><button class="act" id="rt">Retry</button>';
    $('#rt').onclick = () => ipcRenderer.send('cc-refresh');
  } else {
    m.textContent = 'Checking usage…';
  }
}

function renderContext() {
  const val = $('#ctxVal'), name = $('#ctxName'), fill = $('#ctxFill'), warn = $('#ctxWarn');
  if (!ctx) {
    val.textContent = '–'; val.style.color = cssVar('--btn');
    warn.textContent = '';
    name.textContent = 'no session found'; name.style.color = cssVar('--subtle');
    fill.style.width = '0%';
    return;
  }
  if (ctx.unavailable) {
    val.textContent = '–'; val.style.color = cssVar('--btn');
    warn.textContent = '';
    name.textContent = 'claude · ' + (ctx.title || 'chat') + ' — sign in';
    name.style.color = cssVar('--subtle');
    fill.style.width = '0%';
    return;
  }
  const kindLabel = ctx.kind === 'web' ? 'claude · ' : 'cowork · ';
  val.textContent = '~' + fmtTokens(ctx.tokens);
  const pct = Math.max(0, Math.min(100, (ctx.tokens / (ctx.limit || 1000000)) * 100));
  fill.style.width = pct + '%';
  name.textContent = kindLabel + (ctx.title || 'session');
  if (ctx.tier === 'huge') {
    val.style.color = cssVar('--bad');
    fill.style.background = cssVar('--bad-fill');
    warn.textContent = '⚠ start a new chat';
    warn.style.color = cssVar('--bad');
    name.style.color = cssVar('--bad');
  } else if (ctx.tier === 'large') {
    val.style.color = cssVar('--warn');
    fill.style.background = cssVar('--warn');
    warn.textContent = 'getting large';
    warn.style.color = cssVar('--warn');
    name.style.color = cssVar('--hint');
  } else {
    val.style.color = cssVar('--text');
    fill.style.background = cssVar('--primary');
    warn.textContent = '';
    name.style.color = cssVar('--subtle');
  }
}

function applyTheme(t) {
  document.body.classList.toggle('light', t === 'light');
  const btn = $('#theme');
  btn.innerHTML = t === 'light' ? MOON : SUN;
  btn.title = 'Switch to ' + (t === 'light' ? 'dark' : 'light') + ' theme';
}

function loadTheme() {
  let t = null;
  try { t = localStorage.getItem(THEME_KEY); } catch (e) { /* ignore */ }
  return (t === 'light' || t === 'dark') ? t : 'dark';
}

function saveTheme(t) {
  try { localStorage.setItem(THEME_KEY, t); } catch (e) { /* ignore */ }
}

function render() {
  $('#dot').style.background = dotColor();
  renderUsage();
  renderContext();
}

ipcRenderer.on('usage', (_e, d) => { usage = d; render(); });
ipcRenderer.on('context', (_e, d) => { ctx = d; render(); });

$('#pick').onclick = () => ipcRenderer.send('cc-open-picker');
$('#refresh').onclick = () => ipcRenderer.send('cc-refresh');
$('#close').onclick = () => ipcRenderer.send('cc-quit');
$('#ctxName').onclick = () => ipcRenderer.send('cc-open-picker');

$('#theme').onclick = () => {
  const next = document.body.classList.contains('light') ? 'dark' : 'light';
  applyTheme(next);
  saveTheme(next);
  render();
};

applyTheme(loadTheme());
setInterval(() => { if (usage && usage.state === 'ok') render(); }, 1000);
render();
</script>
</body>
</html>
